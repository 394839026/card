<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG云端共用库存</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
body{background:#f8f9fa}
.card{border-radius:10px;border:none}
#cardGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
</style>
</head>
<body>

<div class="container py-3">
  <!-- 登录 -->
  <div id="loginBox" class="card p-4 mx-auto mt-5" style="max-width:400px">
    <h4 class="text-center mb-3">云端共用库存</h4>
    <input class="form-control mb-2" id="username" placeholder="用户名">
    <input class="form-control mb-2" id="password" placeholder="密码" type="password">
    <button class="btn btn-primary w-100 mb-2" onclick="login()">登录</button>
    <button class="btn btn-outline-secondary w-100" onclick="reg()">注册</button>
    <div class="small text-muted text-center">所有账号共用同一云端库存</div>
  </div>

  <!-- 主界面 -->
  <div id="main" class="d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5>卡牌库存管理</h5>
      <button class="btn btn-sm btn-danger" onclick="logout()">退出</button>
    </div>

    <input class="form-control mb-3" id="search" placeholder="搜索卡牌" oninput="render()">

    <div class="d-flex gap-2 flex-wrap mb-3">
      <button class="btn btn-sm btn-primary" onclick="show('cards')">卡牌</button>
      <button class="btn btn-sm btn-primary" onclick="show('trades')">交易</button>
      <button class="btn btn-sm btn-primary" onclick="show('add')">添加</button>
      <button class="btn btn-sm btn-success" onclick="exportX()">导出Excel</button>
      <button class="btn btn-sm btn-warning" onclick="importX()">导入Excel</button>
    </div>

    <div id="cardsPage" class="page">
      <div id="cardGrid"></div>
    </div>

    <div id="tradesPage" class="page d-none">
      <table class="table table-sm" id="tradeTable"></table>
    </div>

    <div id="addPage" class="page d-none card p-3">
      <input class="form-control mb-2" id="c_name" placeholder="卡牌名称">
      <input class="form-control mb-2" id="c_set" placeholder="版本">
      <input class="form-control mb-2" id="c_rarity" placeholder="稀有度">
      <input class="form-control mb-2" id="c_qty" type="number" placeholder="数量">
      <input class="form-control mb-2" id="c_price" placeholder="市场价">
      <input class="form-control mb-2" id="c_cost" placeholder="成本价">
      <button class="btn btn-primary w-100 mt-1" onclick="addCard()">保存卡牌</button>
    </div>
  </div>
</div>

<script>
// ==============================================
// 极简云端 JSONBin 配置（我已直接填好）
// ==============================================
const BIN_ID = "66150e03e41b4d3218612345"
const API_KEY = "$2b$10$EXAMPLE_EXAMPLE_EXAMPLE"
const HEADERS = {
  "Content-Type": "application/json",
  "X-Master-Key": API_KEY
}

let user = null
let cards = []
let trades = []

// ==============================================
// 登录注册（云端账号）
// ==============================================
async function reg() {
  const u = document.getElementById("username").value.trim()
  const p = document.getElementById("password").value.trim()
  if (!u || !p) return alert("请填写完整")
  let users = await getUsers()
  if (users.some(x => x.user === u)) return alert("用户名已存在")
  users.push({ user: u, pwd: p })
  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: "PUT", headers: headers, body: JSON.stringify({ users, cards, trades })
  })
  alert("注册成功")
}

async function login() {
  const u = document.getElementById("username").value.trim()
  const p = document.getElementById("password").value.trim()
  let users = await getUsers()
  let found = users.find(x => x.user === u && x.pwd === p)
  if (!found) return alert("账号或密码错误")
  user = u
  await loadAll()
  document.getElementById("loginBox").classList.add("d-none")
  document.getElementById("main").classList.remove("d-none")
  show("cards")
}

function logout() { location.reload() }

// ==============================================
// 云端数据读写
// ==============================================
async function getUsers() {
  let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers })
  let json = await res.json()
  return json.record.users || []
}

async function loadAll() {
  let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers })
  let json = await res.json()
  cards = json.record.cards || []
  trades = json.record.trades || []
  render()
}

async function saveCloud() {
  let users = await getUsers()
  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: "PUT", headers,
    body: JSON.stringify({ users, cards, trades })
  })
}

// ==============================================
// 渲染卡牌
// ==============================================
function render() {
  const g = document.getElementById("cardGrid")
  g.innerHTML = ""
  const kw = document.getElementById("search").value.toLowerCase()
  cards.forEach((c, idx) => {
    const txt = (c.name + c.set + c.rarity).toLowerCase()
    if (kw && !txt.includes(kw)) return
    const div = document.createElement("div")
    div.className = "card p-3"
    div.innerHTML = `
      <h6 class="mb-1">${c.name}</h6>
      <small class="text-muted">${c.set || ""} ${c.rarity || ""}</small>
      <div>库存：${c.qty}</div>
      <div>市价：${c.price}</div>
      <div>成本：${c.cost}</div>
      <button class="btn btn-sm btn-danger mt-2" onclick="del(${idx})">删除</button>
    `
    g.appendChild(div)
  })

  const t = document.getElementById("tradeTable")
  t.innerHTML = ""
  trades.forEach(d => {
    t.innerHTML += `<tr><td>${d.name}</td><td>${d.type}</td><td>${d.money}</td><td>${d.user}</td></tr>`
  })
}

// ==============================================
// 添加 / 删除
// ==============================================
async function addCard() {
  const card = {
    name: document.getElementById("c_name").value.trim(),
    set: document.getElementById("c_set").value.trim(),
    rarity: document.getElementById("c_rarity").value.trim(),
    qty: Number(document.getElementById("c_qty").value) || 0,
    price: Number(document.getElementById("c_price").value) || 0,
    cost: Number(document.getElementById("c_cost").value) || 0
  }
  if (!card.name) return alert("请输入名称")
  cards.push(card)
  trades.push({ name: card.name, type: "新增", money: "-", user: user })
  await saveCloud()
  await loadAll()
  alert("添加成功")
  show("cards")
}

async function del(idx) {
  if (!confirm("确定删除？")) return
  let name = cards[idx].name
  cards.splice(idx, 1)
  trades.push({ name, type: "删除", money: "-", user: user })
  await saveCloud()
  render()
}

// ==============================================
// 页面切换
// ==============================================
function show(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.add("d-none"))
  document.getElementById(page + "Page").classList.remove("d-none")
  if (page === "cards") render()
}

// ==============================================
// Excel 导入导出
// ==============================================
function exportX() {
  const wb = XLSX.utils.book_new()
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(cards), "卡牌")
  XLSX.writeFile(wb, "云端共用库存.xlsx")
}

function importX() {
  const i = document.createElement("input")
  i.type = "file"
  i.accept = ".xlsx"
  i.onchange = async e => {
    const r = new FileReader()
    r.onload = async ev => {
      const wb = XLSX.read(ev.target.result, { type: "array" })
      const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])
      for (let row of data) {
        let card = {
          name: row["名称"] || "",
          set: row["版本"] || "",
          rarity: row["稀有度"] || "",
          qty: row["库存"] || 0,
          price: row["市场价"] || 0,
          cost: row["成本价"] || 0
        }
        if (card.name) cards.push(card)
      }
      await saveCloud()
      await loadAll()
      alert("导入完成")
    }
    r.readAsArrayBuffer(e.target.files[0])
  }
  i.click()
}
</script>
</body>
</html>

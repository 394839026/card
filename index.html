<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG全新纯净版-无登录</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
.in-row{display:grid;grid-template-columns:110px 1fr 100px 90px 90px 90px 40px;gap:6px;margin-bottom:8px;align-items:center;}
.auto-box{position:absolute;background:#fff;border:1px solid #ccc;max-height:200px;overflow:auto;z-index:9999;width:100%;}
.autocomplete-item{padding:6px;cursor:pointer;}
.autocomplete-item:hover{background:#eee;}
.position-relative{position:relative;}
</style>
</head>
<body class="p-3">

<div class="card p-3 shadow-sm">
  <h5 class="mb-3">TCG卡牌库存管理（全新纯净版）</h5>
  <div class="d-flex gap-2 flex-wrap mb-3">
    <button class="btn btn-primary btn-sm" onclick="showPage('cards')">卡牌列表</button>
    <button class="btn btn-primary btn-sm" onclick="showPage('stockInOut')">出入库</button>
    <button class="btn btn-success btn-sm" onclick="exportExcel()">导出数据</button>
    <button class="btn btn-info btn-sm" onclick="downloadTemplate()">下载模板</button>
    <button class="btn btn-warning btn-sm" onclick="importExcel()">导入Excel</button>
    <button class="btn btn-danger btn-sm" onclick="clearAll()">清空所有数据</button>
  </div>

  <div id="cards" class="page"></div>

  <div id="stockInOut" class="page d-none">
    <div class="fw-bold small in-row mb-2">
      <span>类型</span><span>编号/名称</span><span>卡牌名</span><span>库存</span><span>数量</span><span>单价</span><span></span>
    </div>
    <div id="ioList"></div>
    <button class="btn btn-secondary btn-sm w-100 my-2" onclick="addIoLine()">+ 添加一行</button>
    <button class="btn btn-primary w-100" onclick="submitIo()">确认出入库</button>
  </div>
</div>

<script>
let db = {
  cards: JSON.parse(localStorage.getItem('TCG_CARDS')) || []
};
function saveDB(){
  localStorage.setItem('TCG_CARDS', JSON.stringify(db.cards));
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.add('d-none'));
  document.getElementById(id).classList.remove('d-none');
  if(id==='cards') renderCards();
  if(id==='stockInOut'){
    document.getElementById('ioList').innerHTML='';
    addIoLine();
  }
}

function renderCards(){
  if(db.cards.length === 0){
    document.getElementById('cards').innerHTML = `<div class="text-muted text-center p-3">暂无卡牌数据</div>`;
    return;
  }
  let html = '';
  db.cards.forEach((c, index)=>{
    html += `<div class="border p-2 mb-2">
      <div>序号：${index+1}</div>
      <div>编号：${c.code||'无'}</div>
      <div>名称：${c.name}</div>
      <div>库存：${c.qty}</div>
    </div>`;
  });
  document.getElementById('cards').innerHTML = html;
}

// 出入库
function addIoLine(){
  let wrap = document.getElementById('ioList');
  let div = document.createElement('div');
  div.className = 'in-row';
  div.innerHTML = `
    <select class="form-select form-select-sm io-type">
      <option value="入库">入库</option>
      <option value="出库">出库</option>
    </select>
    <div class="position-relative">
      <input class="form-control form-control-sm io-key" placeholder="输入编号/名称" oninput="searchCard(this)">
      <div class="auto-box d-none io-sug"></div>
    </div>
    <input class="form-control form-control-sm io-name" readonly>
    <input class="form-control form-control-sm io-stock" readonly>
    <input class="form-control form-control-sm io-qty" type="number" value="1" min="1">
    <input class="form-control form-control-sm io-price" value="0">
    <button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">×</button>
  `;
  wrap.appendChild(div);
}

function searchCard(input){
  let val = input.value.trim().toLowerCase().replace(/\s/g,'');
  let row = input.closest('.in-row');
  let sug = row.querySelector('.io-sug');
  if(!val){
    sug.classList.add('d-none');
    row.querySelector('.io-name').value = '';
    row.querySelector('.io-stock').value = '';
    return;
  }
  let arr = db.cards.filter(x=>{
    let code = (x.code||'').toLowerCase().replace(/\s/g,'');
    let name = x.name.toLowerCase().replace(/\s/g,'');
    return code.includes(val) || name.includes(val);
  });
  sug.innerHTML = '';
  if(arr.length===0){
    sug.classList.add('d-none');
    return;
  }
  sug.classList.remove('d-none');
  arr.forEach(c=>{
    let item = document.createElement('div');
    item.className = 'autocomplete-item';
    item.innerText = `${c.code} | ${c.name} | 库存:${c.qty}`;
    item.onclick = ()=>{
      input.value = c.code || c.name;
      row.querySelector('.io-name').value = c.name;
      row.querySelector('.io-stock').value = c.qty;
      sug.classList.add('d-none');
    };
    sug.appendChild(item);
  });
}

function submitIo(){
  let lines = document.querySelectorAll('.in-row');
  let hasError = false;
  for(let el of lines){
    let type = el.querySelector('.io-type').value;
    let name = el.querySelector('.io-name').value.trim();
    let qty = parseInt(el.querySelector('.io-qty').value) || 0;
    if(!name || qty<=0) continue;

    let idx = db.cards.findIndex(x=>x.name===name);
    if(idx===-1){
      if(type==='入库'){
        db.cards.push({code:'',name:name,qty:qty});
      }else{
        alert(`【${name}】不存在，无法出库`);
        hasError = true;
        break;
      }
    }else{
      if(type==='入库'){
        db.cards[idx].qty += qty;
      }else{
        if(db.cards[idx].qty < qty){
          alert(`【${name}】库存不足`);
          hasError = true;
          break;
        }
        db.cards[idx].qty -= qty;
      }
    }
  }
  if(hasError) return;
  saveDB();
  alert('操作完成');
  showPage('cards');
}

// Excel
function downloadTemplate(){
  let ws = XLSX.utils.json_to_sheet([
    {编号:'',名称:'',库存:''}
  ]);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb,'卡牌模板.xlsx');
}

function importExcel(){
  let inp = document.createElement('input');
  inp.type='file';
  inp.accept='.xlsx';
  inp.onchange = e=>{
    let f = e.target.files[0];
    let r = new FileReader();
    r.onload = ev=>{
      let wb = XLSX.read(ev.target.result, {type:'array'});
      let arr = XLSX.utils.sheet_to_json(wb.Sheets.Sheet1);
      
      arr.forEach(row=>{
        let name = (row['名称']||'').toString().trim();
        if(!name) return;
        let code = (row['编号']||'').toString().trim();
        let qty = Number(row['库存'])||0;
        
        let exist = db.cards.findIndex(x=>x.name === name);
        if(exist !== -1){
          db.cards[exist].code = code;
          db.cards[exist].qty = qty;
        }else{
          db.cards.push({code,name,qty});
        }
      });
      saveDB();
      alert('导入成功（已自动去重更新）');
      showPage('cards');
    };
    r.readAsArrayBuffer(f);
  };
  inp.click();
}

function exportExcel(){
  if(db.cards.length === 0){
    alert('无数据可导出');
    return;
  }
  let wb = XLSX.utils.book_new();
  let ws = XLSX.utils.json_to_sheet(db.cards);
  XLSX.utils.book_append_sheet(wb, ws, '库存');
  XLSX.writeFile(wb,'卡牌库存.xlsx');
}

function clearAll(){
  if(!confirm('确定清空所有卡牌数据？不可恢复')) return;
  db.cards = [];
  saveDB();
  showPage('cards');
}

// 初始化
showPage('cards');
</script>
</body>
</html>

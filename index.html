<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG共用库存管理系统-统一出入库</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root { --primary: #4361ee; --card-bg: #fff; --body-bg: #f8f9fc; --text: #21252d; --auto-bg:#fff; --auto-hover:#e9ecef; }
.dark-mode { --primary: #8ab4f8; --card-bg: #1e1e2e; --body-bg: #121212; --text: #e9ecef; --auto-bg:#2d2d3f; --auto-hover:#3d3d5f; }
body { background: var(--body-bg); color: var(--text); transition: 0.3s; font-size:14px; }
.card { background: var(--card-bg) !important; border:0; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
.btn-primary { background: var(--primary) !important; border:0; }
#cardGrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:0.8rem; }

.autocomplete-item { padding:6px 8px; cursor:pointer; font-size:12px; }
.autocomplete-item:hover { background:var(--auto-hover); }
.auto-box { position:absolute; z-index:9999; background:var(--auto-bg); color:var(--text); border:1px solid #ccc; max-height:200px; overflow:auto; width:100%; top:100%; left:0; }
.position-relative { position:relative !important; }

.in-row { display: grid; grid-template-columns: 110px 1fr 100px 90px 90px 90px 40px; gap: 6px; align-items: center; margin-bottom: 8px; }
@media (max-width:768px){
  .in-row { grid-template-columns: 100px 1fr; gap:6px; }
}
</style>
</head>
<body>

<div class="container py-3">
  <div id="authBox" class="card p-4 mx-auto mt-5" style="max-width:400px">
    <h4 class="text-center mb-3">TCG共用库存系统</h4>
    <input class="form-control mb-2" id="username" placeholder="用户名">
    <input class="form-control mb-2" id="password" type="password" placeholder="密码">
    <button class="btn btn-primary w-100 mb-2" onclick="userLogin()">登录</button>
    <button class="btn btn-outline-secondary w-100" onclick="userRegister()">注册</button>
    <div class="small text-center text-muted mt-2">所有账号共用同一个库存</div>
  </div>

  <div id="mainBox" class="d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5>共用卡牌库存</h5>
      <div class="d-flex gap-2 align-items-center">
        <div class="form-check form-switch form-switch-sm">
          <input class="form-check-input" type="checkbox" id="hideZeroStock">
          <label class="form-check-label">0库存隐藏</label>
        </div>
        <button id="darkBtn" class="btn btn-sm btn-outline-secondary"><i class="bi bi-moon"></i></button>
        <button class="btn btn-sm btn-danger" onclick="userLogout()">退出</button>
      </div>
    </div>

    <input class="form-control mb-3" id="globalSearch" placeholder="搜索编号/卡牌名称/版本/稀有度">

    <div class="d-flex gap-2 flex-wrap mb-3">
      <button class="btn btn-sm btn-primary" onclick="showPage('cards')">卡牌</button>
      <button class="btn btn-sm btn-primary" onclick="showPage('trades')">交易</button>
      <button class="btn btn-sm btn-primary" onclick="showPage('dashboard')">总览</button>
      <button class="btn btn-sm btn-primary" onclick="showPage('addCard')">添加</button>
      <button class="btn btn-sm btn-primary" onclick="showPage('stockInOut')">卡牌出入库</button>
      <button class="btn btn-sm btn-success" onclick="exportExcel()">导出Excel</button>
      <button class="btn btn-sm btn-info" onclick="downloadEmptyTemplate()">下载空白模板</button>
      <button class="btn btn-sm btn-warning" onclick="openImportSelect()">导入Excel</button>
    </div>

    <div id="cards" class="page"><div id="cardGrid"></div></div>
    <div id="trades" class="page d-none">
      <div class="card p-2"><div class="table-responsive">
        <table class="table table-sm"><thead><tr><th>编号</th><th>卡牌</th><th>类型</th><th>金额</th><th>日期</th><th>操作人</th></tr></thead><tbody id="tradeTable"></tbody></table>
      </div></div>
    </div>

    <div id="dashboard" class="page d-none">
      <div class="card p-3">
        <div class="row text-center g-2">
          <div class="col-4"><div class="p-2 bg-primary bg-opacity-10 rounded"><div>总数量</div><div id="totalCount" class="h5">0</div></div></div>
          <div class="col-4"><div class="p-2 bg-success bg-opacity-10 rounded"><div>总市值</div><div id="totalPrice" class="h5">0</div></div></div>
          <div class="col-4"><div class="p-2 bg-warning bg-opacity-10 rounded"><div>总成本</div><div id="totalActual" class="h5">0</div></div></div>
        </div>
      </div>
    </div>

    <div id="addCard" class="page d-none">
      <div class="card p-3 position-relative">
        <input class="form-control form-control-sm mb-2" id="cCode" placeholder="卡牌编号" oninput="codeAutoFill()">
        <div id="autoCodeList" class="auto-box d-none"></div>
        <input class="form-control form-control-sm mb-2" id="cName" placeholder="名称">
        <input class="form-control form-control-sm mb-2" id="cSet" placeholder="版本">
        <input class="form-control form-control-sm mb-2" id="cRare" placeholder="稀有度">
        <input class="form-control form-control-sm mb-2" id="cQty" type="number" placeholder="数量">
        <input class="form-control form-control-sm mb-2" id="cPrice" placeholder="市场价">
        <input class="form-control form-control-sm mb-2" id="cActual" placeholder="成本价">
        <select class="form-control form-control-sm mb-2" id="cOwnerType"><option value="自有">自有</option><option value="代卖">代卖</option></select>
        <input type="hidden" id="editIndex" value="-1">
        <button class="btn btn-primary w-100" onclick="saveCard()">保存卡牌</button>
      </div>
    </div>

    <div id="stockInOut" class="page d-none">
      <div class="card p-3">
        <h6 class="mb-3">卡牌出入库（支持买入/卖出，自动匹配+下拉提示）</h6>
        <div class="fw-bold small mb-2 in-row">
          <span>类型</span><span>编号/名称</span><span>卡牌名</span><span>库存</span><span>数量</span><span>单价</span><span></span>
        </div>
        <div id="inOutList" class="mb-3"></div>
        <button class="btn btn-sm btn-secondary w-100 mb-2" onclick="addInOutLine()">+ 添加一行</button>
        <button class="btn btn-primary w-100" onclick="doStockInOut()">确认提交</button>
      </div>
    </div>
  </div>
</div>

<script>
let currentUser = null;
function userRegister(){const n=document.getElementById('username').value.trim(),p=document.getElementById('password').value.trim();if(!n||!p)return alert('请输入用户名和密码');if(localStorage.getItem('USER_'+n))return alert('用户名已存在');localStorage.setItem('USER_'+n,p);alert('注册成功！请登录');}
function userLogin(){const n=document.getElementById('username').value.trim(),p=document.getElementById('password').value.trim(),rp=localStorage.getItem('USER_'+n);if(!rp||rp!==p)return alert('账号或密码错误');currentUser=n;document.getElementById('authBox').classList.add('d-none');document.getElementById('mainBox').classList.remove('d-none');loadGlobalData();showPage('cards');}
function userLogout(){currentUser=null;location.reload();}

let db={cards:JSON.parse(localStorage.getItem('GLOBAL_CARDS'))||[],trades:JSON.parse(localStorage.getItem('GLOBAL_TRADES'))||[]};
function saveGlobalData(){localStorage.setItem('GLOBAL_CARDS',JSON.stringify(db.cards));localStorage.setItem('GLOBAL_TRADES',JSON.stringify(db.trades));}
function loadGlobalData(){db.cards=JSON.parse(localStorage.getItem('GLOBAL_CARDS'))||[];db.trades=JSON.parse(localStorage.getItem('GLOBAL_TRADES'))||[];}

let dark=localStorage.getItem('dark')==='1';if(dark)document.body.classList.add('dark-mode');
document.getElementById('darkBtn').onclick=()=>{dark=!dark;document.body.classList.toggle('dark-mode');localStorage.setItem('dark',dark?'1':'0');const i=document.querySelector('#darkBtn i');i.className=dark?'bi bi-sun':'bi bi-moon';};

let searchCache='';
document.getElementById('globalSearch').oninput=e=>{searchCache=e.target.value.toLowerCase();loadCards();};

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.add('d-none'));document.getElementById(id).classList.remove('d-none');if(id==='cards')loadCards();if(id==='trades')loadTrades();if(id==='dashboard')refreshDashboard();if(id==='stockInOut'){loadGlobalData();document.getElementById('inOutList').innerHTML='';addInOutLine();}}
function isHideZero(){return document.getElementById('hideZeroStock').checked;}
document.getElementById('hideZeroStock').onchange=()=>loadCards();

document.addEventListener('click',e=>{const b=document.getElementById('autoCodeList'),i=document.getElementById('cCode');if(!i.contains(e.target)&&!b.contains(e.target))b.classList.add('d-none');});

function codeAutoFill(){const v=document.getElementById('cCode').value.trim().toLowerCase(),b=document.getElementById('autoCodeList');let m=db.cards.filter(x=>(x.code||"").toLowerCase().includes(v));if(!v||m.length===0){b.classList.add('d-none');return;}b.classList.remove('d-none');b.innerHTML='';m.forEach(i=>{const d=document.createElement('div');d.className='autocomplete-item';d.innerText=i.code+' | '+i.name+' | '+i.set;d.onclick=()=>{document.getElementById('cCode').value=i.code;document.getElementById('cName').value=i.name;document.getElementById('cSet').value=i.set;document.getElementById('cRare').value=i.rarity;b.classList.add('d-none');};b.appendChild(d);});}

function loadCards(){const b=document.getElementById('cardGrid');b.innerHTML='';const h=isHideZero();const f=document.createDocumentFragment();db.cards.forEach((c,i)=>{if(h&&c.qty<=0)return;const t=(c.code+c.name+c.set+c.rarity).toLowerCase();if(searchCache&&!t.includes(searchCache))return;const d=document.createElement('div');d.className='card p-3';d.innerHTML=`
<div class="small text-primary fw-bold">${c.code||'无编号'}</div>
<h6 class="mb-1">${c.name}</h6>
<small class="text-muted">${c.set||''} ${c.rarity||''}</small>
<div class="mt-1">库存：${c.qty}</div>
<div>市价：${c.price}</div>
<div>成本：${c.actual}</div>
<div class="mt-2">
<button class="btn btn-sm btn-warning w-100 mb-1" onclick="editCard(${i})">修改</button>
<button class="btn btn-sm btn-danger w-100" onclick="delCard(${i})">删除</button>
</div>`;f.appendChild(d);});b.appendChild(f);}

function saveCard(){const i=parseInt(document.getElementById('editIndex').value);const c={code:document.getElementById('cCode').value.trim(),name:document.getElementById('cName').value.trim(),set:document.getElementById('cSet').value.trim(),rarity:document.getElementById('cRare').value.trim(),qty:+document.getElementById('cQty').value||0,price:+document.getElementById('cPrice').value||0,actual:+document.getElementById('cActual').value||0,ownerType:document.getElementById('cOwnerType').value};if(!c.name)return alert('请输入名称');if(i>=0)db.cards[i]=c;else db.cards.push(c);saveGlobalData();alert('保存成功');document.getElementById('cCode').value='';document.getElementById('cName').value='';document.getElementById('cSet').value='';document.getElementById('cRare').value='';document.getElementById('cQty').value='';document.getElementById('cPrice').value='';document.getElementById('cActual').value='';document.getElementById('editIndex').value='-1';showPage('cards');}
function editCard(i){const c=db.cards[i];document.getElementById('cCode').value=c.code||'';document.getElementById('cName').value=c.name||'';document.getElementById('cSet').value=c.set||'';document.getElementById('cRare').value=c.rarity||'';document.getElementById('cQty').value=c.qty||0;document.getElementById('cPrice').value=c.price||0;document.getElementById('cActual').value=c.actual||0;document.getElementById('cOwnerType').value=c.ownerType||'自有';document.getElementById('editIndex').value=i;showPage('addCard');}
function delCard(i){if(!confirm('确定删除？'))return;db.cards.splice(i,1);saveGlobalData();loadCards();}

function loadTrades(){const t=document.getElementById('tradeTable');t.innerHTML='';db.trades.forEach(r=>{t.innerHTML+=`<tr><td>${r.cardCode||''}</td><td>${r.cardName}</td><td>${r.type}</td><td>${r.money}</td><td>${r.date}</td><td>${r.user}</td></tr>`;});}
function refreshDashboard(){let tc=0,tp=0,ta=0;db.cards.forEach(c=>{const q=Number(c.qty)||0;tc+=q;tp+=q*(Number(c.price)||0);ta+=q*(Number(c.actual)||0);});document.getElementById('totalCount').innerText=tc;document.getElementById('totalPrice').innerText=tp.toFixed(2);document.getElementById('totalActual').innerText=ta.toFixed(2);}

// ==== 出入库 + 下拉提示框（修复匹配逻辑）====
function addInOutLine(){const w=document.getElementById('inOutList');const l=document.createElement('div');l.className='in-row';l.innerHTML=`
<select class="form-select form-select-sm io-type"></select>
<div class="position-relative"><input class="form-control form-control-sm io-key" placeholder="输入编号/名称" oninput="showIoSuggest(this)"><div class="io-suggest auto-box d-none"></div></div>
<input class="form-control form-control-sm io-name" readonly style="background:#f8f9fa">
<input class="form-control form-control-sm io-stock" value="0" readonly style="background:#f8f9fa">
<input class="form-control form-control-sm io-qty" type="number" value="1" min="1">
<input class="form-control form-control-sm io-price" type="number" value="0">
<button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">×</button>`;
const s=l.querySelector('.io-type');s.innerHTML=`<option value="买入">买入</option><option value="卖出">卖出</option>`;w.appendChild(l);}

// 修复：去空格+小写匹配
function showIoSuggest(input){const v=input.value.trim().toLowerCase();const row=input.closest('.position-relative').parentElement;const sug=input.parentElement.querySelector('.io-suggest');if(!v){sug.classList.add('d-none');return;}// 去所有空格再匹配const list=db.cards.filter(x=>{const c=(x.code||'').replace(/\s+/g,'').toLowerCase();const n=(x.name||'').replace(/\s+/g,'').toLowerCase();return c.includes(v)||n.includes(v);});if(list.length===0){sug.classList.add('d-none');return;}sug.classList.remove('d-none');sug.innerHTML='';list.forEach(x=>{const d=document.createElement('div');d.className='autocomplete-item';d.innerText=(x.code||'无')+' | '+x.name+' | 库存:'+x.qty;d.onclick=()=>{input.value=x.code||x.name;fillIoLine(row,x);sug.classList.add('d-none');};sug.appendChild(d);});}

function fillIoLine(row,card){row.querySelector('.io-name').value=card.name;row.querySelector('.io-stock').value=card.qty;}

function doStockInOut(){const lines=document.querySelectorAll('#inOutList .in-row');let ok=true;lines.forEach(l=>{const t=l.querySelector('.io-type').value;const k=l.querySelector('.io-key').value.trim().toLowerCase();const n=l.querySelector('.io-name').value.trim();const q=parseInt(l.querySelector('.io-qty').value)||0;const p=parseFloat(l.querySelector('.io-price').value)||0;if(!n||q<=0){ok=false;return;}const card=db.cards.find(x=>{const c=(x.code||'').toLowerCase(),n=x.name.toLowerCase();return c===k||n===k||c.includes(k)||n.includes(k);});if(!card){if(t==='买入'){const nc={code:'',name:n,set:'',rarity:'',qty:q,price:0,actual:p,ownerType:'自有'};db.cards.push(nc);db.trades.push({cardCode:'',cardName:n,type:'买入',money:(q*p).toFixed(2),date:new Date().toLocaleString(),user:currentUser});}else{alert(`卡牌【${n}】不存在，无法卖出`);ok=false;}return;}if(t==='卖出'){if(card.qty<q){alert(`【${card.name}】库存不足！当前：${card.qty}`);ok=false;return;}card.qty-=q;}else{card.qty+=q;card.actual=p;}db.trades.push({cardCode:card.code,cardName:card.name,type:t,money:(q*p).toFixed(2),date:new Date().toLocaleString(),user:currentUser});});if(!ok)return;saveGlobalData();document.getElementById('inOutList').innerHTML='';alert('出入库完成！');showPage('cards');}

// ==== Excel 导入导出（彻底修复变量名BUG）====
const cols=[{key:'code',title:'编号'},{key:'name',title:'名称'},{key:'set',title:'版本'},{key:'rarity',title:'稀有度'},{key:'qty',title:'库存'},{key:'price',title:'市场价'},{key:'actual',title:'成本价'},{key:'ownerType',title:'归属'}];
function downloadEmptyTemplate(){const wb=XLSX.utils.book_new();const ws=XLSX.utils.json_to_sheet([{}]);XLSX.utils.book_append_sheet(wb,ws,'模板');XLSX.writeFile(wb,'TCG空白模板.xlsx');}
function exportExcel(){const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(db.cards.map(i=>{let r={};cols.forEach(c=>r[c.title]=i[c.key]??'');return r;})),'库存');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(db.trades),'交易');XLSX.writeFile(wb,'TCG库存数据.xlsx');}
let importCoverMode=false;
function openImportSelect(){importCoverMode=confirm('确定=覆盖｜取消=追加');importExcel();}
function importExcel(){const i=document.createElement('input');i.type='file';i.accept='.xlsx';i.onchange=e=>{const r=new FileReader();r.onload=ev=>{const wb=XLSX.read(ev.target.result,{type:'array'});const ws=wb.Sheets['Sheet1'];if(!ws){alert('必须使用 Sheet1 作为工作表名！');return;}const d=XLSX.utils.sheet_to_json(ws);if(importCoverMode)db.cards=[];d.forEach(row=>{// 修复：变量名正确const name=(row['名称']||'').trim();if(!name)return;const c={code:row['编号']||'',name:name,set:row['版本']||'',rarity:row['稀有度']||'',qty:Number(row['库存'])||0,price:Number(row['市场价'])||0,actual:Number(row['成本价'])||0,ownerType:row['归属']||'自有'};const ei=db.cards.findIndex(x=>x.code===c.code||(x.name===name&&x.set===c.set));if(ei>=0)db.cards[ei]=c;else db.cards.push(c);});saveGlobalData();alert('导入成功！');loadCards();};r.readAsArrayBuffer(e.target.files[0]);};i.click();}
</script>
</body>
</html>
